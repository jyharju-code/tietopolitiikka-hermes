name: tietopolitiikka-hermes

services:
  ollama:
    image: ${OLLAMA_IMAGE}
    restart: unless-stopped
    environment:
      OLLAMA_KEEP_ALIVE: 10m
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "1"
    volumes:
      - ${DATA_ROOT}/ollama:/root/.ollama
    networks:
      - memory
    mem_limit: 1600m
    cpus: 1.25
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 20s
      timeout: 10s
      retries: 12
      start_period: 20s
    logging: &logging
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  ollama-init:
    image: ${OLLAMA_IMAGE}
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull bge-m3"]
    networks:
      - memory
    mem_limit: 256m
    cpus: 0.75
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  openviking:
    build:
      context: .
      dockerfile: images/openviking/Dockerfile
    restart: unless-stopped
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    environment:
      MEMORY_VLM_API_KEY: ${MEMORY_VLM_API_KEY:-${DEEPSEEK_API_KEY}}
      MEMORY_VLM_API_BASE: ${MEMORY_VLM_API_BASE:-https://api.deepseek.com/v1}
      MEMORY_VLM_MODEL: ${MEMORY_VLM_MODEL:-deepseek-v4-flash}
      OPENVIKING_API_KEY: ${OPENVIKING_API_KEY}
    volumes:
      - ${DATA_ROOT}/openviking:/data
      - ./config/openviking/ov.conf.template:/config/ov.conf.template:ro
    networks:
      - memory
    mem_limit: 900m
    cpus: 1.00
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:1933/health"]
      interval: 30s
      timeout: 10s
      retries: 12
      start_period: 90s
    logging: *logging

  hermes:
    build:
      context: .
      dockerfile: images/hermes/Dockerfile
      args:
        HERMES_BASE_IMAGE: ${HERMES_IMAGE}
    image: tietopolitiikka-hermes-agent:local
    restart: unless-stopped
    depends_on:
      openviking:
        condition: service_healthy
    command: ["gateway", "run"]
    environment:
      HERMES_HOME: /opt/data
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      MISTRAL_BASE_URL: ${MISTRAL_BASE_URL:-https://api.eu.mistral.ai/v1}
      OPENVIKING_ENDPOINT: http://openviking:1933
      OPENVIKING_API_KEY: ${OPENVIKING_API_KEY}
      OPENVIKING_ACCOUNT: tietopolitiikka
      OPENVIKING_USER: telegram-core
      OPENVIKING_AGENT: tietopolitiikka-hermes
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_GROUP_ID: ${TELEGRAM_GROUP_ID:-}
      TELEGRAM_ALLOWED_CHATS: ${TELEGRAM_GROUP_ID:-}
      TELEGRAM_GROUP_ALLOWED_CHATS: ${TELEGRAM_GROUP_ID:-}
      TELEGRAM_REQUIRE_MENTION: "false"
      TELEGRAM_REPLY_TO_MODE: first
      TELEGRAM_API_BASE_URL: ${TELEGRAM_API_BASE_URL:-}
      HERMES_DASHBOARD: "true"
      HERMES_DASHBOARD_HOST: 0.0.0.0
      HERMES_DASHBOARD_PORT: "9119"
      HERMES_DASHBOARD_PUBLIC_URL: ${HERMES_DASHBOARD_PUBLIC_URL:-https://tietopolitiikka.pages.dev}
      HERMES_DASHBOARD_BASIC_AUTH_USERNAME: ${HERMES_DASHBOARD_BASIC_AUTH_USERNAME}
      HERMES_DASHBOARD_BASIC_AUTH_PASSWORD: ${HERMES_DASHBOARD_BASIC_AUTH_PASSWORD}
      HERMES_DASHBOARD_FILES_ROOT: /opt/data/dashboard-files
    volumes:
      - ${DATA_ROOT}/hermes:/opt/data
    networks:
      - memory
      - edge
    mem_limit: 1g
    cpus: 1.25
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - KILL
      - SETGID
      - SETUID
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-u", "${HERMES_DASHBOARD_BASIC_AUTH_USERNAME}:${HERMES_DASHBOARD_BASIC_AUTH_PASSWORD}", "http://127.0.0.1:9119/api/status"]
      interval: 30s
      timeout: 10s
      retries: 12
      start_period: 60s
    logging: *logging

networks:
  memory:
    internal: false
    driver: bridge
  edge:
    internal: true
    driver: bridge
  # Outbound-only network for the Cloudflare Tunnel connector. The dashboard
  # stays on the internal edge network with no host port; cloudflared joins
  # both so it can reach the dashboard and still egress to Cloudflare.
  egress:
    internal: false
    driver: bridge
