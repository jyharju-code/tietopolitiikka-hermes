name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run repository tests
        run: python3 -m unittest discover -s tests -v
      - name: Check shell syntax
        run: bash -n ops/*.sh images/openviking/*.sh
      - name: Check Pages worker syntax
        run: node --check pages/_worker.js
      - name: Check example Compose rendering
        run: docker compose --env-file .env.example config --quiet
      - name: Check optional Compose overlays
        run: |
          docker compose --env-file .env.example -f docker-compose.yml -f docker-compose.telegram-local.yml config --quiet
          docker compose --env-file .env.example -f docker-compose.yml -f docker-compose.tunnel.yml config --quiet
